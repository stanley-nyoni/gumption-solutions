<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Gumption Solutions</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://gumptionsolutions.co.za/404.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f1c2e;
      --teal: #1a7f64;
      --teal-light: #e8f5f1;
      --warm-white: #f9f7f4;
      --mid: #6b7280;
      --border: #e5e2dc;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--warm-white);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Decorative background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Big broken appliance icon */
    .icon-wrap {
      margin: 0 auto 2rem;
      width: 120px;
      height: 120px;
      background: var(--teal-light);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: wobble 3.5s ease-in-out infinite;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(-2deg); }
      50%       { transform: rotate(2deg); }
    }

    .icon-wrap svg {
      width: 64px;
      height: 64px;
    }

    .error-code {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(80px, 18vw, 120px);
      line-height: 1;
      color: var(--navy);
      letter-spacing: -4px;
      margin-bottom: 0.25rem;
      position: relative;
      display: inline-block;
    }

    .error-code::after {
      content: 'Error';
      position: absolute;
      bottom: -8px;
      right: -10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--teal);
      background: var(--teal-light);
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0;
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(20px, 4vw, 26px);
      font-weight: 600;
      margin: 1.75rem 0 0.75rem;
      color: var(--navy);
    }

    p {
      font-size: 16px;
      line-height: 1.7;
      color: var(--mid);
      margin-bottom: 2rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 24px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
      border: none;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: var(--teal);
      color: #fff;
      box-shadow: 0 4px 14px rgba(26,127,100,0.3);
    }

    .btn-primary:hover { box-shadow: 0 6px 20px rgba(26,127,100,0.4); }

    .btn-secondary {
      background: #fff;
      color: var(--navy);
      border: 1.5px solid var(--border);
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .btn-secondary:hover { border-color: #c5c0b8; }

    /* Quick links */
    .quick-links {
      border-top: 1px solid var(--border);
      padding-top: 1.75rem;
    }

    .quick-links-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--mid);
      margin-bottom: 1rem;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .link-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      text-decoration: none;
      text-align: left;
      transition: border-color 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .link-card:hover {
      border-color: var(--teal);
      transform: translateY(-1px);
    }

    .link-card-icon {
      width: 32px;
      height: 32px;
      background: var(--teal-light);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
    }

    .link-card-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--navy);
      line-height: 1.3;
    }

    .link-card-sub {
      font-size: 11px;
      color: var(--mid);
      margin-top: 1px;
    }

    /* Footer bar */
    .footer-bar {
      margin-top: 2.5rem;
      font-size: 13px;
      color: var(--mid);
    }

    .footer-bar a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-bar a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="container">

    <div class="icon-wrap">
      <!-- Washing machine with an X — broken appliance motif -->
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="48" height="52" rx="6" fill="#1a7f64" opacity="0.15"/>
        <rect x="8" y="8" width="48" height="52" rx="6" stroke="#1a7f64" stroke-width="2.5"/>
        <rect x="14" y="14" width="36" height="8" rx="3" fill="#1a7f64" opacity="0.2"/>
        <circle cx="32" cy="38" r="12" stroke="#1a7f64" stroke-width="2.5"/>
        <circle cx="32" cy="38" r="6" stroke="#1a7f64" stroke-width="2" stroke-dasharray="4 3"/>
        <!-- X mark -->
        <line x1="26" y1="32" x2="38" y2="44" stroke="#e05a4e" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="38" y1="32" x2="26" y2="44" stroke="#e05a4e" stroke-width="2.5" stroke-linecap="round"/>
        <!-- control dots -->
        <circle cx="18" cy="18" r="2.5" fill="#1a7f64" opacity="0.5"/>
        <circle cx="25" cy="18" r="2.5" fill="#1a7f64" opacity="0.3"/>
      </svg>
    </div>

    <div class="error-code">404</div>

    <h1>This page needs a repair</h1>
    <p>Looks like the page you're looking for has gone missing. Head back home.</p>

    <div class="actions">
      <a class="btn btn-primary" href="https://gumptionsolutions.co.za/">
        ← Back to home
      </a>
      <a class="btn btn-secondary" href="https://wa.me/27718606501?text=Hi%20Gumption%20Solutions%2C%20I%20need%20appliance%20repair">
        WhatsApp us
      </a>
    </div>

    <div class="footer-bar">
      Need to talk to someone? Call <a href="tel:+27718606501">071 860 6501</a>
    </div>

  </div>

</body>
</html>
